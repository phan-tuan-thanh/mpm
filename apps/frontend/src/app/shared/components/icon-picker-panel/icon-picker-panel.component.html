<div class="p-2 w-64">
  <input
    pInputText
    type="text"
    placeholder="Tìm icon..."
    class="w-full mb-3 text-sm"
    [ngModel]="search()"
    (ngModelChange)="search.set($event)"
  />
  <div class="max-h-52 overflow-y-auto space-y-3">
    @for (group of filteredGroups(); track group.label) {
      <div>
        <p class="text-xs text-gray-400 dark:text-surface-500 uppercase tracking-wider mb-1 px-1">{{ group.label }}</p>
        <div class="flex flex-wrap gap-1">
          @for (icon of group.icons; track icon) {
            <button
              type="button"
              class="w-8 h-8 flex items-center justify-center rounded hover:bg-gray-100 dark:hover:bg-surface-700 transition-colors border-2 cursor-pointer"
              [class.border-blue-500]="value === icon"
              [class.border-transparent]="value !== icon"
              (click)="select(icon)"
              [title]="icon"
            >
              <i [class]="icon" class="text-sm"></i>
            </button>
          }
        </div>
      </div>
    }
    @if (filteredGroups().length === 0) {
      <p class="text-xs text-gray-400 text-center py-3">Không tìm thấy icon</p>
    }
  </div>
</div>
