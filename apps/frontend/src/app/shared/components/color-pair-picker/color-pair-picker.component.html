<div class="flex flex-col gap-2">
  <div class="flex items-center gap-2">
    <span class="text-xs text-gray-500 dark:text-surface-400 w-10 shrink-0">Light</span>
    <button
      type="button"
      class="w-6 h-6 rounded border border-gray-300 dark:border-surface-600 shrink-0 hover:scale-110 transition-transform cursor-pointer"
      [style.background-color]="light"
      (click)="lightPop.toggle($event)"
    ></button>
    <span class="text-xs font-mono text-gray-500 dark:text-surface-400">{{ light }}</span>
    <p-popover #lightPop>
      <app-color-picker-panel
        [value]="light"
        (valueChange)="onLightChange($event)"
      />
    </p-popover>
  </div>
  <div class="flex items-center gap-2">
    <span class="text-xs text-gray-500 dark:text-surface-400 w-10 shrink-0">Dark</span>
    <button
      type="button"
      class="w-6 h-6 rounded border border-gray-300 dark:border-surface-600 shrink-0 hover:scale-110 transition-transform cursor-pointer"
      [style.background-color]="dark"
      (click)="darkPop.toggle($event)"
    ></button>
    <span class="text-xs font-mono text-gray-500 dark:text-surface-400">{{ dark }}</span>
    <p-popover #darkPop>
      <app-color-picker-panel
        [value]="dark"
        (valueChange)="onDarkChange($event)"
      />
    </p-popover>
  </div>
</div>
